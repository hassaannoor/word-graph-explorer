<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Word Graph — eng / lat / grc</title>
  <link rel="stylesheet" href="static/style.css" />
</head>
<body>
  <aside id="sidebar">
    <h1>Word graph</h1>
    <p class="muted">English &middot; Latin &middot; Greek (via WordNet + OMW)</p>

    <div class="search-block">
      <label for="search-input">Search</label>
      <div class="search-wrapper">
        <input id="search-input" type="text" autocomplete="off" placeholder="type a word…" />
        <ul id="autocomplete" class="autocomplete hidden"></ul>
      </div>
      <button id="search-btn">Go</button>
    </div>

    <div class="settings">
      <h2>Settings</h2>
      <label>
        <span>Per-relation cap</span>
        <input id="setting-limit" type="range" min="3" max="30" value="10" />
        <output id="setting-limit-out">10</output>
      </label>
      <label>
        <span>Graph depth</span>
        <input id="setting-depth" type="range" min="1" max="2" value="1" />
        <output id="setting-depth-out">1</output>
      </label>
      <label>
        <span>Sense to display</span>
        <select id="setting-sense"></select>
      </label>
      <label class="check">
        <input id="setting-show-grc" type="checkbox" checked />
        <span>Show Greek</span>
      </label>
      <label class="check">
        <input id="setting-show-lat" type="checkbox" checked />
        <span>Show Latin</span>
      </label>
      <label class="check">
        <input id="setting-show-eng" type="checkbox" checked />
        <span>Show English</span>
      </label>
    </div>

    <div class="info">
      <h2>Tip</h2>
      <p class="muted">Click a node to focus it. Same word twice rewinds the breadcrumb instead of pushing again.</p>
      <p class="muted small">Note: NLTK's OMW does not ship Latin lemmas, so Latin slots may stay empty.</p>
    </div>
  </aside>

  <main id="stage">
    <nav id="breadcrumbs" aria-label="History"></nav>
    <div id="status" class="status hidden"></div>
    <div id="graph-container">
      <svg id="graph"></svg>
    </div>
  </main>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="static/app.js"></script>
</body>
</html>
